name: release

# v* 태그를 푸시하면 서명된 release APK를 빌드해 GitHub 릴리스(draft)에 올린다.
# 사람이 GitHub에서 검토 후 수동 publish한다.
#
# 주의: RELEASE_KEYSTORE_* 시크릿의 키스토어는 절대 재생성하지 않는다 — 서명이 바뀌면
# 기존 설치본이 인앱 업데이트로 새 버전을 설치할 수 없다(서명 불일치).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Write NAVER_MAP_NCP_KEY_ID to local.properties
        # 기존 gradle 읽기 로직(naverMapNcpKeyId)을 바꾸지 않기 위해 local.properties에 기록한다.
        env:
          NAVER_MAP_NCP_KEY_ID: ${{ secrets.NAVER_MAP_NCP_KEY_ID }}
        run: echo "NAVER_MAP_NCP_KEY_ID=$NAVER_MAP_NCP_KEY_ID" >> local.properties

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Verify tag matches app versionName
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::태그 $GITHUB_REF_NAME 이 app/build.gradle.kts의 versionName=$GRADLE_VERSION 과 다릅니다. versionCode/versionName을 올리고 다시 태그하세요."
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Build signed release APK
        env:
          PLACE_SEARCH_BASE_URL: ${{ vars.PLACE_SEARCH_BASE_URL }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "release-artifacts/daegu-bus-${GITHUB_REF_NAME#v}.apk"

      - name: Create draft release with APK
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release-artifacts/*.apk
          generate_release_notes: true

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

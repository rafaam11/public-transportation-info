<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" width="920" height="200" role="img" aria-label="대구 버스">
  <defs>
    <linearGradient id="db-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121722"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="db-logobg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b3f78"/>
      <stop offset="1" stop-color="#062647"/>
    </linearGradient>
  </defs>
  <rect width="920" height="200" rx="18" fill="url(#db-bg)"/>
  <rect x="0.5" y="0.5" width="919" height="199" rx="17.5" fill="none" stroke="#26313f"/>

  <!-- logo: side-view bus pictogram (launcher icon motif) -->
  <g transform="translate(56,58) scale(3.5)">
    <rect x="1.32" y="1.32" width="21.36" height="21.36" rx="5.4" fill="url(#db-logobg)"/>
    <g fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4.6" y="8.1" width="14.8" height="7.6" rx="2"/>
      <line x1="4.6" y1="12" x2="19.4" y2="12"/>
      <line x1="9" y1="8.1" x2="9" y2="12"/>
      <line x1="14" y1="8.1" x2="14" y2="12"/>
    </g>
    <circle cx="8" cy="16.6" r="1.3" fill="#ffffff"/>
    <circle cx="16" cy="16.6" r="1.3" fill="#ffffff"/>
  </g>

  <!-- title + tagline -->
  <text x="186" y="92" font-family="Segoe UI, system-ui, sans-serif" font-size="40" font-weight="700" fill="#f3f5f9">대구 버스</text>
  <text x="188" y="125" font-family="Segoe UI, system-ui, sans-serif" font-size="18" fill="#9aa3b2">출퇴근 버스 실시간 위치 · 초정밀 도착 정보 — 개인용 Android 앱</text>

  <!-- chips -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="188" y="146" width="76" height="25" rx="12.5" fill="#171d28" stroke="#26313f"/>
    <text x="226" y="163" fill="#ff6a39" text-anchor="middle">Kotlin</text>
    <rect x="272" y="146" width="140" height="25" rx="12.5" fill="#171d28" stroke="#26313f"/>
    <text x="342" y="163" fill="#ff6a39" text-anchor="middle">Jetpack Compose</text>
    <rect x="420" y="146" width="100" height="25" rx="12.5" fill="#171d28" stroke="#26313f"/>
    <text x="470" y="163" fill="#ff6a39" text-anchor="middle">사이드로드</text>
  </g>
</svg>

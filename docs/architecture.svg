<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" width="960" height="470" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="대구 버스 아키텍처">
  <defs>
    <marker id="db-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6675"/>
    </marker>
    <linearGradient id="db-arch-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121722"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
  </defs>
  <rect width="960" height="470" rx="14" fill="url(#db-arch-bg)" stroke="#26313f"/>

  <!-- ── top flow: UI → ViewModel → Repository/원격 ── -->
  <rect x="32" y="58" width="272" height="150" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="48" y="85" font-size="15" font-weight="700" fill="#f3f5f9">UI · Jetpack Compose</text>
  <text x="48" y="112" font-size="11.5" fill="#9aa3b2">DashboardScreen ·</text>
  <text x="48" y="130" font-size="11.5" fill="#9aa3b2">RealtimeMapScreen · SetupScreen</text>
  <text x="48" y="156" font-size="11.5" fill="#9aa3b2">CommuteWidget (Glance)</text>
  <text x="48" y="188" font-size="11.5" fill="#9aa3b2"><tspan fill="#ff6a39">StateFlow</tspan> 구독 · collectAsState</text>

  <rect x="344" y="58" width="248" height="150" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="360" y="85" font-size="15" font-weight="700" fill="#f3f5f9">ViewModel</text>
  <text x="360" y="112" font-size="11.5" fill="#9aa3b2">BusAppViewModel</text>
  <text x="360" y="130" font-size="11.5" fill="#9aa3b2">RealtimeMapViewModel</text>
  <text x="360" y="160" font-size="11.5" fill="#ff6a39">viewModelScope.launch</text>
  <text x="360" y="188" font-size="11.5" fill="#9aa3b2">AppGraph · 수동 DI 싱글턴</text>

  <rect x="632" y="58" width="296" height="150" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="648" y="85" font-size="15" font-weight="700" fill="#f3f5f9">Repository · 원격 데이터</text>
  <text x="648" y="112" font-size="11.5" fill="#9aa3b2">DashboardRepository · UpdateRepository</text>
  <text x="648" y="130" font-size="11.5" fill="#9aa3b2">대구 버스 공공데이터 API</text>
  <text x="648" y="148" font-size="11.5" fill="#9aa3b2">Accubus 초정밀 위치 · NAVER Map</text>
  <text x="648" y="188" font-size="11.5" fill="#ff6a39">GitHub Releases (업데이트 체크)</text>

  <!-- request/response arrows -->
  <line x1="304" y1="133" x2="344" y2="133" stroke="#5a6675" stroke-width="1.6" marker-start="url(#db-arr)" marker-end="url(#db-arr)"/>
  <line x1="592" y1="133" x2="632" y2="133" stroke="#5a6675" stroke-width="1.6" marker-start="url(#db-arr)" marker-end="url(#db-arr)"/>

  <!-- down to safety row -->
  <line x1="780" y1="208" x2="780" y2="258" stroke="#5a6675" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#db-arr)"/>

  <!-- ── safety row ── -->
  <text x="32" y="246" font-size="13" font-weight="600" fill="#9aa3b2">안전장치 — 모든 데이터 호출이 지키는 원칙</text>

  <rect x="32" y="262" width="210" height="146" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="48" y="290" font-size="13" font-weight="700" fill="#f3f5f9">신선도 정책</text>
  <text x="48" y="316" font-size="11.5" fill="#9aa3b2">GPS 15초 초과 → 반투명</text>
  <text x="48" y="334" font-size="11.5" fill="#ff6a39">30초 초과 → 마커 숨김</text>
  <text x="48" y="362" font-size="11.5" fill="#9aa3b2">정류소 좌표로 대체 안 함</text>

  <rect x="257" y="262" width="210" height="146" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="273" y="290" font-size="13" font-weight="700" fill="#f3f5f9">폴링 없음</text>
  <text x="273" y="316" font-size="11.5" fill="#9aa3b2">위젯은 수동 새로고침만</text>
  <text x="273" y="334" font-size="11.5" fill="#ff6a39">업데이트 확인 1회 + 수동</text>
  <text x="273" y="362" font-size="11.5" fill="#9aa3b2">백그라운드 요청 없음</text>

  <rect x="482" y="262" width="210" height="146" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="498" y="290" font-size="13" font-weight="700" fill="#f3f5f9">TLS 고정</text>
  <text x="498" y="316" font-size="11.5" fill="#9aa3b2">accubus.daegu.go.kr 전용</text>
  <text x="498" y="334" font-size="11.5" fill="#ff6a39">GlobalSign 중간 인증서</text>
  <text x="498" y="362" font-size="11.5" fill="#9aa3b2">다른 호스트엔 적용 안 함</text>

  <rect x="707" y="262" width="210" height="146" rx="10" fill="#171d28" stroke="#26313f"/>
  <text x="723" y="290" font-size="13" font-weight="700" fill="#f3f5f9">서명 키 고정</text>
  <text x="723" y="316" font-size="11.5" fill="#9aa3b2">release 키스토어 재생성 금지</text>
  <text x="723" y="334" font-size="11.5" fill="#ff6a39">서명 불일치 시 업데이트 불가</text>
  <text x="723" y="362" font-size="11.5" fill="#9aa3b2">GitHub Secrets로 CI만 서명</text>

  <text x="32" y="440" font-size="11" fill="#5a6675">renderer 계층 없음 — Compose UI가 ViewModel의 StateFlow를 직접 구독하고, 원격 호출은 Repository가 중계한다</text>
</svg>

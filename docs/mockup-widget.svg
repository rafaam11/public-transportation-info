<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 820" width="400" height="820" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="홈 화면 위젯 (와이어프레임 목업)">
  <defs>
    <linearGradient id="db-wallpaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b47"/>
